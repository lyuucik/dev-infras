apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-hello
  labels:
    app: hello
    {{- include "hello-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: hello
    {{- include "hello-app.selectorLabels" . | nindent 4 }}
